name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
        working-directory: server
      - run: npm run build
        working-directory: server

  build-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
        working-directory: client
      - run: npm run type-check
        working-directory: client
      - run: npm run build
        working-directory: client
        env:
          VITE_WS_URL: https://mahjong.example.com
          VITE_API_BASE: /api/v1
