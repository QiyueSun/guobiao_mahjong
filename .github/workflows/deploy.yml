name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run unit tests
        run: cd server && npm install && npx jest --passWithNoTests

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          install -m 600 /dev/null /tmp/deploy_key
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} \
            'cd ~/mahjong && git pull && docker compose -f docker-compose.prod.yml up -d --no-deps server'
