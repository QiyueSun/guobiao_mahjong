version: '3.9'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=mahjong
      - POSTGRES_PASSWORD=mahjong
      - POSTGRES_DB=mahjong
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://mahjong:mahjong@postgres:5432/mahjong
      - SESSION_SECRET=${SESSION_SECRET:-dev-secret-change-in-prod}
      - NODE_ENV=production
      - LOG_LEVEL=debug
      - CLIENT_ORIGIN=http://localhost:5173
      - SHARE_BASE_URL=http://localhost:5173
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-http://localhost:3001/api/v1/auth/google/callback}
    depends_on:
      - redis
      - postgres
    volumes:
      - ./server/src:/app/src

  client:
    build:
      context: ./client
      args:
        VITE_WS_URL: http://localhost:3001
        VITE_API_BASE: /api/v1
    ports:
      - "5173:80"
    depends_on:
      - server

volumes:
  redis_data:
  postgres_data:
