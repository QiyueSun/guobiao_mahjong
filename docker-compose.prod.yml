version: '3.9'

services:
  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - client_dist:/usr/share/nginx/html:ro
    depends_on:
      - server

  server:
    build: ./server
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - DATABASE_URL=postgresql://mahjong:${POSTGRES_PASSWORD}@postgres:5432/mahjong
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
      - CLIENT_ORIGIN=${CLIENT_ORIGIN}
    command: node dist/index.js
    volumes: []
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --save 60 1
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=mahjong
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=mahjong
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mahjong"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  client:
    build:
      context: ./client
      args:
        VITE_WS_URL: ${PROD_WS_URL}
        VITE_API_BASE: /api/v1
    volumes:
      - client_dist:/usr/share/nginx/html

volumes:
  client_dist:
  redis_data:
  postgres_data:
