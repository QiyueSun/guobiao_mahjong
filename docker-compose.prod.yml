version: '3.9'

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - client_dist:/usr/share/nginx/html:ro
    depends_on:
      - server

  server:
    restart: always
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
    command: node dist/index.js
    volumes: []
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    restart: always
    command: >
      redis-server
        --requirepass ${REDIS_PASSWORD}
        --save 60 1
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru

  client:
    build:
      context: ./client
      args:
        VITE_WS_URL: ${PROD_WS_URL}
        VITE_API_BASE: /api/v1
    volumes:
      - client_dist:/usr/share/nginx/html

volumes:
  client_dist:
  redis_data:
